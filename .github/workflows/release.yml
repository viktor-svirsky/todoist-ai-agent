name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.find_pr.outputs.pr_number }}
      pr_sha: ${{ steps.find_pr.outputs.pr_sha }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Find release PR
        id: find_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RP_PR: ${{ steps.release.outputs.pr }}
        run: |
          if [ -n "$RP_PR" ]; then
            # release-please created or updated a PR
            PR_NUMBER=$(echo "$RP_PR" | jq -r '.number')
          else
            # PR unchanged — look for an existing open release-please PR
            PR_NUMBER=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "release-please" \
              --state open --json number --jq '.[0].number // empty')
          fi
          if [ -n "$PR_NUMBER" ]; then
            SHA=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" --jq '.head.sha')
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "pr_sha=$SHA" >> "$GITHUB_OUTPUT"
          fi

  # GITHUB_TOKEN pushes don't trigger pull_request workflows on release-please
  # PRs. Run CI here and report status checks on the PR head SHA so branch
  # protection required checks pass.
  frontend:
    needs: release
    if: needs.release.outputs.pr_number
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.pr_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Test
        run: cd frontend && npm test

      - name: Build
        run: cd frontend && npm run build

      - name: Report status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.release.outputs.pr_sha }}
          STATUS: ${{ job.status == 'success' && 'success' || 'failure' }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f state="$STATUS" \
            -f context="frontend" \
            -f description="Release CI" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

  deno-tests:
    needs: release
    if: needs.release.outputs.pr_number
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.pr_sha }}

      - uses: denoland/setup-deno@v2

      - name: Lint
        run: deno lint supabase/functions/

      - name: Test
        run: deno test supabase/functions/tests/ --no-check --allow-env --allow-read

      - name: Report status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.release.outputs.pr_sha }}
          STATUS: ${{ job.status == 'success' && 'success' || 'failure' }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f state="$STATUS" \
            -f context="deno-tests" \
            -f description="Release CI" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

  auto-merge:
    needs: [release, frontend, deno-tests]
    if: needs.release.outputs.pr_number
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.release.outputs.pr_number }}
        run: gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --squash --auto
