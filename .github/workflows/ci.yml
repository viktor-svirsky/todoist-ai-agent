name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Test
        run: cd frontend && npm test

      - name: Build
        run: cd frontend && npm run build

  deno-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2

      - name: Lint
        run: deno lint supabase/functions/

      - name: Test (unit + integration)
        run: deno test supabase/functions/tests/ --no-check --allow-env --allow-read --ignore=supabase/functions/tests/e2e/

  e2e-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2

      - name: E2E integration tests (real HTTP)
        run: deno test supabase/functions/tests/e2e/ --no-check --allow-env --allow-net --allow-read --ignore=supabase/functions/tests/e2e/post-deploy.e2e.test.ts
        env:
          DEFAULT_BRAVE_API_KEY: ${{ secrets.DEFAULT_BRAVE_API_KEY }}
